<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>शाळा सर्वेक्षण</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f0; min-height: 100vh; padding: 16px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; max-width: 560px; margin: 0 auto; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .header { background: #1a6b3a; color: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; text-align: center; }
    .header h1 { font-size: 20px; margin-bottom: 4px; }
    .header p  { font-size: 13px; opacity: 0.85; }
    label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 6px; margin-top: 18px; }
    select, input[type="tel"], input[type="number"], textarea {
      width: 100%; padding: 12px; border: 1.5px solid #ccc; border-radius: 8px;
      font-size: 15px; font-family: inherit; background: #fafafa; transition: border-color 0.2s;
    }
    select:focus, input:focus, textarea:focus { outline: none; border-color: #1a6b3a; background: #fff; }
    textarea { height: 90px; resize: vertical; }
    .subtext { font-size: 12px; color: #888; margin-top: 3px; margin-bottom: 4px; }
    .match-ok   { color: #1a6b3a; font-size: 13px; margin-top: 6px; }
    .match-fail { color: #c0392b; font-size: 13px; margin-top: 6px; }
    .prior-notice {
      background: #fff8e1; border-left: 4px solid #f39c12; border-radius: 6px;
      padding: 12px; margin-top: 10px; font-size: 13px; color: #7d4e00; line-height: 1.6;
    }
    .yesno-row { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
    .yesno-btn {
      flex: 1; min-width: 80px; padding: 12px 8px; border: 2px solid #ccc; border-radius: 8px;
      background: #fafafa; font-size: 14px; font-weight: bold; cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .yesno-btn.yes.active { background: #e8f5ee; border-color: #1a6b3a; color: #1a6b3a; }
    .yesno-btn.no.active  { background: #fdecea; border-color: #c0392b; color: #c0392b; }
    .yesno-btn.dk.active  { background: #fef9e7; border-color: #e67e22; color: #e67e22; }
    .question-block { margin-top: 20px; padding-top: 16px; border-top: 1px solid #eee; }
    .question-block.hidden { display: none; }
    .submit-btn {
      width: 100%; background: #1a6b3a; color: #fff; border: none; border-radius: 8px;
      padding: 15px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 28px;
    }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .survey-card {
      border: 1.5px solid #ccc; border-radius: 10px; padding: 16px; margin-bottom: 12px;
      cursor: pointer; transition: all 0.15s; background: #fafafa;
    }
    .survey-card:hover { border-color: #1a6b3a; background: #e8f5ee; }
    .survey-card-name { font-size: 16px; font-weight: bold; color: #1a6b3a; margin-bottom: 4px; }
    .survey-card-sub  { font-size: 13px; color: #666; margin-bottom: 6px; }
    .survey-card-dates { font-size: 12px; color: #888; }
    .section-title { font-size: 17px; font-weight: bold; color: #333; margin-bottom: 4px; }
    .section-sub   { font-size: 13px; color: #888; margin-bottom: 16px; }
    .empty-state { text-align: center; padding: 40px 0; }
    .empty-icon  { font-size: 56px; margin-bottom: 16px; }
    .empty-state h2 { color: #555; font-size: 18px; margin-bottom: 8px; }
    .empty-state p  { color: #888; font-size: 14px; line-height: 1.6; }
    .success-screen { text-align: center; padding: 40px 0; }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    .success-screen h2 { color: #1a6b3a; font-size: 22px; margin-bottom: 8px; }
    .success-screen p  { color: #555; font-size: 15px; line-height: 1.6; }
    .success-school { margin-top: 16px; font-size: 13px; color: #888; }
    .loading { text-align: center; padding: 60px 20px; color: #888; font-size: 16px; }

    /* ── Photo upload question ── */
    .photo-upload-btn {
      display: flex; align-items: center; gap: 10px;
      background: #f0f7f3; border: 2px dashed #1a6b3a; border-radius: 10px;
      padding: 14px 18px; cursor: pointer; margin-top: 8px; width: 100%;
      font-size: 15px; font-weight: bold; color: #1a6b3a; transition: background 0.15s;
    }
    .photo-upload-btn:hover { background: #dff0e8; }
    .photo-upload-btn .icon { font-size: 26px; line-height: 1; }
    .photo-preview-wrap { margin-top: 10px; position: relative; display: inline-block; }
    .photo-preview {
      width: 120px; height: 90px; object-fit: cover;
      border-radius: 8px; border: 2px solid #1a6b3a; display: block; cursor: zoom-in;
    }
    .photo-remove {
      position: absolute; top: -8px; right: -8px;
      background: #c62828; color: #fff; border: none; border-radius: 50%;
      width: 24px; height: 24px; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-weight: bold;
    }
    .photo-optional-note { font-size: 11px; color: #888; margin-top: 6px; }

    /* ── Question image thumbnail ── */
    .q-image-wrap { margin-top: 10px; }
    .q-thumb {
      width: 96px; height: 72px; object-fit: cover;
      border-radius: 6px; border: 2px solid #ccc;
      cursor: zoom-in; display: block; transition: border-color 0.15s;
    }
    .q-thumb:hover { border-color: #1a6b3a; }
    .q-thumb-hint { font-size: 11px; color: #888; margin-top: 4px; }

    /* ── Lightbox overlay ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.82); z-index: 9999;
      align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw; max-height: 88vh;
      border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    #lightbox-close {
      position: absolute; top: 16px; right: 20px;
      color: #fff; font-size: 32px; font-weight: bold;
      cursor: pointer; line-height: 1; user-select: none;
    }
  </style>
</head>
<body>
  <!-- Lightbox overlay -->
  <div id="lightbox" onclick="closeLightbox()">
    <span id="lightbox-close" onclick="closeLightbox()">✕</span>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <div id="app">
    <div class="card">
      <div class="loading">लोड होत आहे... / Loading...</div>
    </div>
  </div>
  <script src="surveys/index.js"></script>
  <script src="app.js"></script>
</body>
</html>
